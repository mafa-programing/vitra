<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics></helmet><div class="pcard {{ cls }}" onClick="{{ it.open }}"><div class="pimg" style="background:{{ it.grad }}"><button class="{{ wishCls }}" onClick="{{ it.toggleWish }}"><svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M12 21s-7-4.5-9.3-8.2C1 9.8 2.6 6 6 6c2 0 3.2 1.3 4 2.3C10.8 7.3 12 6 14 6c3.4 0 5 3.8 3.3 6.8C19 16.5 12 21 12 21z"/></svg></button><sc-if value="{{ it.badge }}" hint-placeholder-val="x"><span class="pbadge">{{ it.badge }}</span></sc-if><span class="phlab">{{ it.cat }}</span></div><div class="pinfo"><div class="pname">{{ it.name }}</div><div class="rrow fx ac gap8"><span class="rate fx ac"><svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M12 3l2.5 5.5 6 .6-4.5 4 1.3 5.9L12 21.5 6.7 19l1.3-5.9-4.5-4 6-.6z"/></svg>{{ it.r }}</span><span class="muted fs11">({{ it.rev }})</span></div><div class="prow2 fx ac gap8"><span class="price">{{ it.price }}</span><span class="mrp">{{ it.mrp }}</span><span class="disc">{{ it.disc }}%</span></div><sc-if value="{{ it.free }}" hint-placeholder-val="x"><span class="freeb fx ac gap8"><span class="freedot"></span>Free delivery</span></sc-if></div><button class="qadd" onClick="{{ it.add }}">+</button></div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:190,&quot;height&quot;:280},&quot;item&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;object&quot;},&quot;cls&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;&quot;,&quot;grid&quot;,&quot;row&quot;,&quot;wide&quot;],&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const it = this.props.item || {};
    return { it, cls: this.props.cls || '', wishCls: it.wished ? 'wbtn on' : 'wbtn' };
  }
}
</script>
</body>
</html>
